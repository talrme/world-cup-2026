name: Refresh World Cup data

on:
  schedule:
    # Every 15 minutes, offset from common quarter-hour boundaries to reduce queue delays.
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:
    inputs:
      all_videos:
        description: "Search video links for every match, not just eligible recent matches"
        required: false
        default: false
        type: boolean
      force_videos:
        description: "Replace existing direct video links if a new match is found"
        required: false
        default: false
        type: boolean
      ai_mode:
        description: "AI insight refresh breadth"
        required: false
        default: standard
        type: choice
        options:
          - minimal
          - standard
          - seed
          - all
      force_all_ai:
        description: "Regenerate all AI insights, subject to script cost/call caps"
        required: false
        default: false
        type: boolean
      skip_ai:
        description: "Skip AI insights even if GEMINI_API_KEY is configured"
        required: false
        default: false
        type: boolean
      commit_changes:
        description: "Commit refreshed data back to main when files change"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: refresh-world-cup-data
  cancel-in-progress: false

jobs:
  refresh:
    name: Refresh schedule and videos
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      ALL_VIDEOS: ${{ github.event_name == 'workflow_dispatch' && inputs.all_videos || false }}
      FORCE_VIDEOS: ${{ github.event_name == 'workflow_dispatch' && inputs.force_videos || false }}
      AI_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.ai_mode || 'standard' }}
      FORCE_ALL_AI: ${{ github.event_name == 'workflow_dispatch' && inputs.force_all_ai || false }}
      SKIP_AI: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_ai || false }}
      COMMIT_CHANGES: ${{ github.event_name != 'workflow_dispatch' || inputs.commit_changes }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: gemini-3.1-flash-lite
      GEMINI_SLEEP_SECONDS: "6"
      SCHEDULED_AI_MAX_CALLS: "30"
      SCHEDULED_VIDEO_MAX_SEARCHES: "8"
      SCHEDULED_VIDEO_RECENT_HOURS: "48"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run refresh
        shell: bash
        run: |
          set -o pipefail
          mkdir -p refresh-output
          start_epoch=$(date +%s)

          args=()
          if [[ "$ALL_VIDEOS" == "true" ]]; then
            args+=(--all-videos)
          fi
          if [[ "$FORCE_VIDEOS" == "true" ]]; then
            args+=(--force-videos)
          fi
          if [[ "$SKIP_AI" == "true" ]]; then
            args+=(--skip-ai)
          else
            args+=(--ai-mode "$AI_MODE")
          fi
          if [[ "$FORCE_ALL_AI" == "true" ]]; then
            args+=(--force-all-ai)
          fi
          if [[ "$GITHUB_EVENT_NAME" == "schedule" ]]; then
            args+=(--video-max-searches "$SCHEDULED_VIDEO_MAX_SEARCHES")
            args+=(--video-recent-hours "$SCHEDULED_VIDEO_RECENT_HOURS")
            args+=(--ai-max-calls "$SCHEDULED_AI_MAX_CALLS")
            args+=(--ai-match-content all)
            args+=(--ai-max-groups 0)
            args+=(--ai-max-players 0)
          fi

          {
            refresh_status=0
            echo "Started at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "Trigger: $GITHUB_EVENT_NAME"
            echo "Options: all_videos=$ALL_VIDEOS force_videos=$FORCE_VIDEOS ai_mode=$AI_MODE force_all_ai=$FORCE_ALL_AI skip_ai=$SKIP_AI commit_changes=$COMMIT_CHANGES"
            echo
            python scripts/refresh_all.py "${args[@]}" || refresh_status=$?
            echo
            end_epoch=$(date +%s)
            elapsed_seconds=$((end_epoch - start_epoch))
            elapsed_minutes=$(awk "BEGIN { printf \"%.2f\", $elapsed_seconds / 60 }")
            {
              echo "elapsed_seconds=$elapsed_seconds"
              echo "elapsed_minutes=$elapsed_minutes"
            } > refresh-output/runtime.env
            echo "Finished at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "Elapsed refresh runtime: ${elapsed_seconds}s (${elapsed_minutes} minutes)"
            exit "$refresh_status"
          } 2>&1 | tee refresh-output/refresh.log

      - name: Summarize run
        if: always()
        shell: bash
        run: |
          if [[ -f refresh-output/runtime.env ]]; then
            source refresh-output/runtime.env
          else
            elapsed_seconds="unknown"
            elapsed_minutes="unknown"
          fi

          {
            echo "## World Cup data refresh"
            echo
            echo "- Trigger: \`$GITHUB_EVENT_NAME\`"
            echo "- Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "- Commit changes: \`$COMMIT_CHANGES\`"
            echo "- Refresh runtime: \`${elapsed_seconds}s\` / \`${elapsed_minutes} minutes\`"
            echo
            echo "### Refresh output"
            echo '```text'
            if [[ -f refresh-output/refresh.log ]]; then
              cat refresh-output/refresh.log
            else
              echo "No refresh log was created."
            fi
            echo '```'
            echo
            echo "### Changed files"
            echo '```text'
            git status --short -- data/world-cup-2026.json schedule-data.js data/player-stats.json player-stats.js data/ai-insights.json ai-insights.js
            echo '```'
            echo
            echo "### Diff summary"
            echo '```text'
            git diff --stat -- data/world-cup-2026.json schedule-data.js data/player-stats.json player-stats.js data/ai-insights.json ai-insights.js || true
            echo '```'
          } | tee refresh-output/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Commit refreshed data
        if: ${{ success() && env.COMMIT_CHANGES == 'true' }}
        shell: bash
        run: |
          mkdir -p refresh-output

          if git diff --quiet -- data/world-cup-2026.json schedule-data.js data/player-stats.json player-stats.js data/ai-insights.json ai-insights.js; then
            echo "No data changes to commit."
            echo "No commit: data files did not change" > refresh-output/commit-label.txt
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/world-cup-2026.json schedule-data.js data/player-stats.json player-stats.js data/ai-insights.json ai-insights.js
          git commit -m "Refresh World Cup data"
          commit_sha=$(git rev-parse --short HEAD)
          echo "Committed refreshed data: $commit_sha" > refresh-output/commit-label.txt
          git push

      - name: Write final summary line
        if: always()
        shell: bash
        run: |
          mkdir -p refresh-output

          extract_log_value() {
            local pattern="$1"
            local cleanup="$2"
            if [[ ! -f refresh-output/refresh.log ]]; then
              return 0
            fi
            grep -E "$pattern" refresh-output/refresh.log 2>/dev/null | tail -n 1 | sed -E "$cleanup" || true
          }

          schedule_updates=$(extract_log_value "^(\[[0-9:]+\] )?Schedule updates applied:" "s/^(\[[0-9:]+\] )?Schedule updates applied: //")
          bracket_updates=$(extract_log_value "^(\[[0-9:]+\] )?Bracket matches changed:" "s/^(\[[0-9:]+\] )?Bracket matches changed: //")
          video_links_saved=$(extract_log_value "^(\[[0-9:]+\] )?New/updated direct video links saved:" "s/^(\[[0-9:]+\] )?New\/updated direct video links saved: //")
          ai_summary=$(extract_log_value "^(\[[0-9:]+\] )?AI insights summary:" "s/^(\[[0-9:]+\] )?AI insights summary: //")
          schedule_updates=${schedule_updates:-unknown}
          bracket_updates=${bracket_updates:-unknown}
          video_links_saved=${video_links_saved:-unknown}
          ai_summary=${ai_summary:-"not run or no key"}

          if [[ "$COMMIT_CHANGES" != "true" ]]; then
            commit_label="No commit: commit_changes was false"
          elif [[ -f refresh-output/commit-label.txt ]]; then
            commit_label=$(cat refresh-output/commit-label.txt)
          else
            commit_label="No commit: refresh or commit step did not finish successfully"
          fi

          final_line="Summary: schedule updates applied=${schedule_updates}; bracket matches changed=${bracket_updates}; new/updated video links saved=${video_links_saved}; AI insights ${ai_summary}; ${commit_label}."
          echo "$final_line"
          echo "$final_line" > refresh-output/final-summary.txt

          {
            echo
            echo "### Final summary"
            echo "$final_line"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload refresh output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refresh-output-${{ github.run_id }}
          path: refresh-output/
          retention-days: 30
