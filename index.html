<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>World Cup Snapshot</title>
    <meta name="description" content="Interactive 2026 World Cup schedule with highlight links." />
    <meta name="theme-color" content="#0b1f16" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="World Cup" />
    <meta name="application-name" content="World Cup Snapshot" />
    <link rel="icon" href="./public/favicon.ico" sizes="any" />
    <link rel="icon" href="./public/favicon-32x32.png" type="image/png" sizes="32x32" />
    <link rel="icon" href="./public/favicon-16x16.png" type="image/png" sizes="16x16" />
    <link rel="apple-touch-icon" sizes="180x180" href="./public/assets/apple-touch-icon.png" />
    <link rel="manifest" href="./public/site.webmanifest" />
    <link rel="stylesheet" href="./site.css" />
    <script>
      (() => {
        const isHostedSite =
          window.location.hostname === "talrme.github.io" &&
          window.location.pathname.startsWith("/world-cup-2026");

        if (!isHostedSite) return;

        const script = document.createElement("script");
        script.async = true;
        script.src = "https://gc.zgo.at/count.js";
        script.dataset.goatcounter = "https://talrme.goatcounter.com/count";
        document.head.appendChild(script);
      })();
    </script>
  </head>
  <body>
    <main id="app" class="app-shell" data-view="timeline">
      <div class="hero-texture" aria-hidden="true"></div>
      <div class="empty-state">
        <strong>Loading schedule</strong>
        <span>Preparing the board.</span>
      </div>
    </main>
    <script src="./schedule-data.js"></script>
    <script src="./static-app.js"></script>
  </body>
</html>
